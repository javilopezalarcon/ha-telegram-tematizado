alias: Enviar Mensaje Telegram Tematizado
mode: queued
fields:
  message:
    name: Mensaje / Caption
    required: false
    selector:
      text:
  tema:
    name: Tema Telegram
    required: false
    selector:
      select:
        options:
        - Tema1        # Renombra con tus temas reales
        - Tema2
        - Tema3
  title:
    name: Título (opcional, solo mensajes de texto)
    required: false
    selector:
      text:
  inline_keyboard:
    name: Inline Keyboard (opcional)
    description: Lista de comandos. Ejemplo - "/Botón1" - "/Botón2"
    required: false
    selector:
      object:
  parse_mode:
    name: Formato de texto (opcional)
    required: false
    selector:
      select:
        options:
        - label: HTML
          value: html
        - label: Markdown
          value: markdown
        - label: MarkdownV2
          value: markdownv2
        - label: Texto sin formato
          value: plain_text
  photo:
    name: Foto (opcional)
    description: Ruta local (/config/www/...) o URL de la imagen a enviar
    required: false
    selector:
      text:
  video:
    name: Vídeo (opcional)
    description: Ruta local o URL del vídeo a enviar
    required: false
    selector:
      text:
  verify_ssl:
    name: Verificar SSL (opcional)
    description: Activar solo si la fuente es HTTPS con certificado válido
    required: false
    default: false
    selector:
      boolean:
sequence:
- variables:
    CHAT_ID: 'TU_CHAT_ID'                  # Ej: '-1001234567890'
    THREAD_TABLE: >
      {{
        {
          "Tema1": 1,                        # Sustituye por tus temas y thread IDs reales
          "Tema2": 2,
          "Tema3": 3
        }
      }}
    THREAD_ID: '{{ THREAD_TABLE[tema] if tema in THREAD_TABLE else none }}'
    INLINE: '{{ inline_keyboard | default("") }}'
    TITLE: '{{ title | default("") }}'
    PARSE_MODE: >
      {% if parse_mode is defined and parse_mode not in ['', 'Texto sin formato'] %}
        {{ parse_mode }}
      {% else %}
        plain_text
      {% endif %}
    MSG: '{{ message | default("") }}'
    PHOTO: '{{ photo | default("") }}'
    VIDEO: '{{ video | default("") }}'
    VERIFY_SSL: '{{ verify_ssl | default(false) }}'
- choose:
  - conditions:
    - condition: template
      value_template: '{{ PHOTO != "" }}'
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ INLINE != "" }}'
        sequence:
        - action: telegram_bot.send_photo
          data:
            chat_id: '{{ CHAT_ID }}'
            message_thread_id: '{{ THREAD_ID }}'
            file: '{{ PHOTO }}'
            caption: '{{ MSG }}'
            inline_keyboard: '{{ INLINE }}'
            verify_ssl: '{{ VERIFY_SSL }}'
      default:
      - action: telegram_bot.send_photo
        data:
          chat_id: '{{ CHAT_ID }}'
          message_thread_id: '{{ THREAD_ID }}'
          file: '{{ PHOTO }}'
          caption: '{{ MSG }}'
          verify_ssl: '{{ VERIFY_SSL }}'
  - conditions:
    - condition: template
      value_template: '{{ VIDEO != "" }}'
    sequence:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ INLINE != "" }}'
        sequence:
        - action: telegram_bot.send_video
          data:
            chat_id: '{{ CHAT_ID }}'
            message_thread_id: '{{ THREAD_ID }}'
            file: '{{ VIDEO }}'
            caption: '{{ MSG }}'
            inline_keyboard: '{{ INLINE }}'
            verify_ssl: '{{ VERIFY_SSL }}'
      default:
      - action: telegram_bot.send_video
        data:
          chat_id: '{{ CHAT_ID }}'
          message_thread_id: '{{ THREAD_ID }}'
          file: '{{ VIDEO }}'
          caption: '{{ MSG }}'
          verify_ssl: '{{ VERIFY_SSL }}'
  - conditions:
    - condition: template
      value_template: '{{ INLINE != "" }}'
    sequence:
    - action: telegram_bot.send_message
      data:
        chat_id: '{{ CHAT_ID }}'
        message: '{{ MSG }}'
        message_thread_id: '{{ THREAD_ID }}'
        title: '{{ TITLE }}'
        parse_mode: '{{ PARSE_MODE }}'
        inline_keyboard: '{{ INLINE }}'
  default:
  - action: telegram_bot.send_message
    data:
      chat_id: '{{ CHAT_ID }}'
      message: '{{ MSG }}'
      message_thread_id: '{{ THREAD_ID }}'
      title: '{{ TITLE }}'
      parse_mode: '{{ PARSE_MODE }}'